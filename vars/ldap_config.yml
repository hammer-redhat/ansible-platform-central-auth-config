---
# Non-secret LDAP and gateway settings. Override per environment with inventory,
# -e, or a separate env-specific vars file.
#
# Secrets live in vars/vault.yml (copy from vars/vault.yml.example); see playbook vars.

# --- Platform gateway ---
aap_hostname: "https://aap.example.com"
aap_validate_certs: true

# --- LDAP connection ---
ldap_uri_scheme: "ldap"
ldap_server_host: "idm.example.com"
ldap_server_port: 389
ldap_uri: "{{ ldap_uri_scheme }}://{{ ldap_server_host }}:{{ ldap_server_port | string }}"

ldap_start_tls: false
ldap_opt_referrals: 0
ldap_opt_network_timeout: 30

# Directory layout (FreeIPA-style: cn=accounts,<base>)
ldap_base_dn: "dc=idm,dc=example,dc=com"
ldap_accounts_ou: "cn=accounts,{{ ldap_base_dn }}"
ldap_user_search_base: "cn=users,{{ ldap_accounts_ou }}"
ldap_group_search_base: "cn=groups,{{ ldap_accounts_ou }}"

# Bind account (RDN under cn=sysaccounts,cn=etc,<base>)
ldap_bind_user: "binduser"
ldap_bind_dn: "uid={{ ldap_bind_user }},cn=sysaccounts,cn=etc,{{ ldap_base_dn }}"

# --- LDAP authenticator (gateway) ---
aap_ldap_authenticator_name: "ldap"
aap_ldap_authenticator_order: 2
aap_ldap_enabled: true
aap_ldap_create_objects: true
aap_ldap_remove_users: true

ldap_group_type: "MemberDNGroupType"
ldap_group_type_params:
  name_attr: "cn"
  member_attr: "member"

ldap_group_search_filter: "(objectClass=posixgroup)"
ldap_group_search_scope: "SCOPE_SUBTREE"

ldap_user_dn_template: "uid=%(user)s,{{ ldap_user_search_base }}"
ldap_user_search: []

ldap_user_attr_map:
  first_name: "givenName"
  last_name: "sn"
  email: "mail"

# Built configuration dict for ansible.platform.authenticator (BIND_PASSWORD added in playbook vars)
aap_ldap_configuration:
  SERVER_URI:
    - "{{ ldap_uri }}"
  BIND_DN: "{{ ldap_bind_dn }}"
  BIND_PASSWORD: "{{ ldap_bind_password }}"
  START_TLS: "{{ ldap_start_tls }}"
  CONNECTION_OPTIONS:
    OPT_REFERRALS: "{{ ldap_opt_referrals | int }}"
    OPT_NETWORK_TIMEOUT: "{{ ldap_opt_network_timeout | int }}"
  GROUP_TYPE: "{{ ldap_group_type }}"
  GROUP_TYPE_PARAMS: "{{ ldap_group_type_params }}"
  GROUP_SEARCH:
    - "{{ ldap_group_search_base }}"
    - "{{ ldap_group_search_scope }}"
    - "{{ ldap_group_search_filter }}"
  USER_DN_TEMPLATE: "{{ ldap_user_dn_template }}"
  USER_SEARCH: "{{ ldap_user_search }}"
  USER_ATTR_MAP: "{{ ldap_user_attr_map }}"

# --- Authenticator map (superuser) ---
aap_ldap_map_admin_name: "admin"
aap_ldap_map_admin_order: 1
aap_ldap_map_admin_revoke: false

ldap_superuser_group_cn: "aap_admins"
ldap_superuser_group_dn: "cn={{ ldap_superuser_group_cn }},{{ ldap_group_search_base }}"

aap_ldap_map_admin_triggers:
  attributes:
    memberof:
      matches: "{{ ldap_superuser_group_dn }}"
    join_condition: "or"
